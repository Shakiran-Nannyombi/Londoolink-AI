    <text x="220" y="365" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">FastAPI • Python 3.12+ • Auth0 FGA • PostgreSQL</text>
    <text x="220" y="390" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• JWT Token Verification</text>
    <text x="220" y="410" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Fine-Grained Authorization</text>
    <text x="220" y="430" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Permission-Based Access Control</text>
    <text x="550" y="390" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Token Vault Integration</text>
    <text x="550" y="410" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Audit Logging</text>
    <text x="550" y="430" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Rate Limiting</text>
  </g>
  
  <line x1="600" y1="450" x2="600" y2="490" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="620" y="475" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">API Calls</text>
  
  <g>
    <rect x="200" y="500" width="800" height="140" rx="8" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="220" y="530" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#374151">LangGraph Multi-Agent System</text>
