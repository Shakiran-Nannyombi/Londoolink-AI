    <text x="220" y="580" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Priority Agent (Briefing Generation)</text>
    <text x="220" y="600" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Data Collection Agent (API Integration)</text>
    <text x="220" y="620" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Persistent Memory and RAG</text>
    <text x="550" y="580" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Email, Calendar, Notion Agents</text>
    <text x="550" y="600" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Secure Token Retrieval</text>
    <text x="550" y="620" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Thread-Based Conversations</text>
  </g>
  
  <line x1="600" y1="640" x2="600" y2="680" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="620" y="665" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Token Request</text>
  
  <g>
    <rect x="200" y="690" width="800" height="140" rx="8" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <text x="220" y="720" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#374151">Auth0 Token Vault</text>
    <text x="220" y="745" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Auth0 Management API • OAuth 2.0 • AES-256 Encryption</text>
    <text x="220" y="770" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Encrypted Token Storage (Gmail, Calendar, Notion)</text>
    <text x="220" y="790" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Automatic Token Refresh</text>
    <text x="220" y="810" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Audit Logging for Compliance</text>
    <text x="550" y="770" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Zero-Trust Architecture</text>
    <text x="550" y="790" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• Secure Key Management</text>
    <text x="550" y="810" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">• GDPR Compliant</text>
  </g>
