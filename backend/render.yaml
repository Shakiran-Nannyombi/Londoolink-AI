services:
  - type: web
    name: londoolink-ai-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: bash startup.sh
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: londoolink-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: CHROMA_DB_PATH
        value: /opt/render/project/src/chroma_db
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: AUTH0_TOKEN_VAULT_BASE_URL
        sync: false
      - key: AUTH0_M2M_CLIENT_ID
        sync: false
      - key: AUTH0_M2M_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://londoolink-ai.vercel.app
      - key: NOTION_CLIENT_ID
        sync: false
      - key: NOTION_CLIENT_SECRET
        sync: false
      - key: NOTION_REDIRECT_URI
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://londoolink-ai.vercel.app,https://londoolink-ai.onrender.com
    healthCheckPath: /
    autoDeploy: true

databases:
  - name: londoolink-db
    databaseName: londoolink
    plan: free
    region: oregon
